name: 生産計画表クロール

on:
  schedule:
    # 日本時間 8:00（UTC 23:00）と 17:00（UTC 8:00）に実行
    - cron: '0 23 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:  # 手動実行も可能にする

jobs:
  crawl:
    runs-on: ubuntu-22.04

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip キャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Playwright キャッシュ
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Playwright（Chromium）をインストール
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: クロールを実行
        env:
          PYTHONUNBUFFERED:           "1"  # GitHub上で print がすぐログに出るようにする
          SITE_LOGIN_ID:              ${{ secrets.SITE_LOGIN_ID }}
          SITE_LOGIN_PASSWORD:        ${{ secrets.SITE_LOGIN_PASSWORD }}
          MAIL_PASSWORD:              ${{ secrets.MAIL_PASSWORD }}
          SPREADSHEET_ID:             ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS:  ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python -u crawler.py

      - name: スクリーンショットを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshot_*.png
